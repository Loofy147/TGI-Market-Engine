name: TGI-Engine-Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-topology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest

      - name: Run TGI Kernel Stress Tests
        # Verifies Thm 3.2, 5.1, and H2 Obstruction logic
        run: pytest tests/test_tgi_kernel.py

  deploy-to-stratosphere:
